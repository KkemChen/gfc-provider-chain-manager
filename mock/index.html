<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Provider Chain Manager Mock</title>
  <style>
    :root {
      --bg: #f5f6f3;
      --panel: #fbfbf8;
      --ink: #1e2428;
      --muted: #6d7478;
      --line: #d9ddd5;
      --blue: #1769e0;
      --blue-soft: #e8f0ff;
      --green: #18715f;
      --green-soft: #e7f4ef;
      --red: #c53b2c;
      --shadow: 0 18px 60px rgba(31, 40, 45, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 0%, #ffffff 0, var(--bg) 38%, #ecefe8 100%);
      color: var(--ink);
      font-family: "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      font-size: 14px;
      letter-spacing: 0;
    }

    button, input {
      font: inherit;
    }

    .shell {
      max-width: 1180px;
      margin: 26px auto;
      padding: 0 18px;
    }

    .window {
      min-height: 720px;
      background: var(--panel);
      border: 1px solid color-mix(in srgb, var(--line), #fff 30%);
      border-radius: 10px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel), #fff 50%);
    }

    .title {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 750;
    }

    .subtitle {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 7px;
      height: 34px;
      padding: 0 12px;
      cursor: pointer;
    }

    .btn.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .btn.ghost {
      background: transparent;
    }

    .content {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 0;
      min-height: 0;
    }

    .pane {
      min-height: 0;
      padding: 18px;
      border-right: 1px solid var(--line);
      overflow: auto;
    }

    .pane:last-child {
      border-right: 0;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 12px;
    }

    .section-title strong {
      font-size: 15px;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .mode {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      background: #ecefe8;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 12px;
    }

    .mode button {
      height: 32px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .mode button.active {
      background: #fff;
      color: var(--ink);
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      font-weight: 700;
    }

    .search {
      width: 100%;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 10px;
      background: #fff;
      color: var(--ink);
      outline: none;
      margin-bottom: 14px;
    }

    .search:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-soft);
    }

    .group-label {
      margin: 15px 0 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .node {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      text-align: left;
      cursor: pointer;
      margin-bottom: 7px;
      transition: border-color .16s ease, background .16s ease, transform .16s ease;
    }

    .node:hover {
      border-color: color-mix(in srgb, var(--blue), var(--line) 30%);
      transform: translateY(-1px);
    }

    .node.selected {
      border-color: var(--blue);
      background: var(--blue-soft);
    }

    .node-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 650;
    }

    .node-meta {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .canvas {
      padding: 24px;
      overflow: auto;
      min-height: 0;
    }

    .route-board {
      min-height: 390px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: linear-gradient(180deg, #ffffff 0%, #f8faf6 100%);
      padding: 28px;
      display: grid;
      align-items: center;
    }

    .route {
      width: min(470px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      align-items: center;
    }

    .step {
      min-height: 70px;
      border: 1px solid color-mix(in srgb, var(--line), #fff 18%);
      border-radius: 9px;
      background: color-mix(in srgb, #fff, var(--panel) 20%);
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      align-items: center;
      column-gap: 10px;
      padding: 10px 12px;
      position: relative;
      box-shadow: 0 1px 0 rgba(30, 36, 40, .03);
    }

    .step.pickable {
      cursor: pointer;
    }

    .step.active {
      border-color: var(--blue);
      background: #fbfdff;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--blue-soft), transparent 20%);
    }

    .step::before {
      content: attr(data-index);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: #fff;
      grid-row: 1 / span 2;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
    }

    .step.pickable::before {
      border-color: color-mix(in srgb, var(--blue), var(--line) 45%);
      background: var(--blue-soft);
      color: var(--blue);
    }

    .step.active::before {
      border-color: var(--blue);
      background: var(--blue);
      box-shadow: inset 0 0 0 7px #fff;
      color: transparent;
    }

    .step-label {
      color: var(--muted);
      font-size: 12px;
      align-self: end;
    }

    .step-value {
      font-weight: 760;
      line-height: 1.35;
      overflow-wrap: anywhere;
      align-self: start;
    }

    .step.empty .step-value {
      color: var(--blue);
    }

    .connector {
      height: 30px;
      width: 1px;
      background: color-mix(in srgb, var(--line), var(--muted) 18%);
      position: relative;
      margin: -1px auto;
    }

    .connector::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -1px;
      width: 6px;
      height: 6px;
      border-right: 1px solid color-mix(in srgb, var(--line), var(--muted) 18%);
      border-bottom: 1px solid color-mix(in srgb, var(--line), var(--muted) 18%);
      transform: translateX(-50%) rotate(45deg);
      background: #fafbf8;
    }

    .summary {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .note {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }

    .note strong {
      display: block;
      margin-bottom: 5px;
    }

    .rules {
      display: grid;
      gap: 9px;
    }

    .rule {
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      padding: 11px;
    }

    .rule.off {
      opacity: .55;
    }

    .rule-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .switch {
      width: 34px;
      height: 20px;
      border: 0;
      border-radius: 999px;
      background: var(--green);
      position: relative;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .switch::after {
      content: "";
      position: absolute;
      top: 3px;
      right: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
    }

    .rule.off .switch {
      background: #b9bfb7;
    }

    .rule.off .switch::after {
      left: 3px;
      right: auto;
    }

    .rule-path {
      display: flex;
      gap: 6px;
      min-width: 0;
      align-items: center;
      font-weight: 720;
      line-height: 1.35;
    }

    .rule-path span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rule-path .arrow {
      color: var(--muted);
      flex: 0 0 auto;
    }

    .rule-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .mini {
      height: 28px;
      padding: 0 9px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
    }

    .advanced {
      margin-top: 14px;
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }

    details summary {
      cursor: pointer;
      font-weight: 700;
    }

    .check {
      display: block;
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.4;
    }

    @media (max-width: 980px) {
      .content {
        grid-template-columns: 1fr;
      }
      .pane {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .summary {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="window">
      <header class="topbar">
        <div class="title">
          <div class="mark">PC</div>
          <div>
            <h1>Provider 链式代理管理</h1>
          <div class="subtitle">基于订阅节点生成名称清晰的链式出口，不改原节点</div>
          </div>
        </div>
        <div class="actions">
          <button class="btn ghost" id="reset">重置草稿</button>
          <button class="btn primary" id="save">保存链路</button>
        </div>
      </header>

      <section class="content">
        <aside class="pane">
          <div class="section-title">
            <strong>选择节点</strong>
            <span class="hint" id="modeHint">当前：出口</span>
          </div>
          <div class="mode" role="tablist">
            <button class="active" id="targetMode">出口节点</button>
            <button id="viaMode">前置节点</button>
          </div>
          <input class="search" id="search" placeholder="搜索出口，例如 trojan / hy2 / 新加坡" />
          <div id="nodeList"></div>
        </aside>

        <div style="display: flex; flex-direction: column; min-height: 0; overflow: auto; border-left: 1px solid var(--line);">
          <section class="canvas" style="border-bottom: 1px solid var(--line); flex: 0 0 auto;">
            <div class="route-board">
              <div class="route">
                <div class="step" data-index="1">
                  <div class="step-label">起点</div>
                  <div class="step-value">本机</div>
                </div>
                <div class="connector"></div>
                <div class="step pickable empty" id="viaStep" data-index="2">
                  <div class="step-label">前置节点</div>
                  <div class="step-value" id="viaValue">点击选择</div>
                </div>
                <div class="connector"></div>
                <div class="step pickable empty active" id="targetStep" data-index="3">
                  <div class="step-label">最终出口</div>
                  <div class="step-value" id="targetValue">点击选择</div>
                </div>
                <div class="connector"></div>
                <div class="step" data-index="4">
                  <div class="step-label">目标</div>
                  <div class="step-value">网站</div>
                </div>
              </div>
            </div>

            <div class="summary">
              <div class="note">
                <strong>用户动作</strong>
                <div class="hint">只需要保存一条链路，然后在策略组里继续选择原来的出口节点。</div>
              </div>
              <div class="note">
                <strong>生成结果</strong>
                <div class="hint" id="yamlPreview">会新增一个链式出口节点，原节点保持不变。</div>
              </div>
            </div>
          </section>

          <aside class="pane" style="border-right: 0; overflow: visible;">
            <div class="section-title">
              <strong>已配置链路</strong>
              <span class="hint" id="ruleCount">2 条</span>
            </div>
            <div class="rules" id="rules"></div>

            <div class="advanced">
              <details>
                <summary>高级生成选项</summary>
                <label class="check"><input type="checkbox" checked /> 展开订阅 provider 到策略组 proxies</label>
                <label class="check"><input type="checkbox" checked /> 删除已展开的 proxy-providers</label>
                <label class="check"><input type="checkbox" /> 保留未配置节点已有 dialer-proxy</label>
              </details>
            </div>
          </aside>
        </div>
      </section>
    </div>
  </main>

  <script>
    const sections = [
      {
        name: "xavierhubs",
        nodes: [
          { id: "hy2", name: "kkem-vfj00xzy", type: "hysteria2" },
          { id: "trojan", name: "trojan-outlet-15022-vfj00xzy-trojan", type: "trojan" }
        ]
      },
      {
        name: "x-air",
        nodes: [
          { id: "sg-anytls", name: "新加坡1←A2·1倍·AnyTLS#18057", type: "anytls" },
          { id: "sg-vision", name: "新加坡1←A2·1倍·Vision#18057", type: "vless" },
          { id: "us-anytls", name: "美国1←A1·0.3倍·AnyTLS#18057", type: "anytls" }
        ]
      },
      {
        name: "webshare",
        nodes: [
          { id: "webshare", name: "webshare-socks5-outlet", type: "socks5" }
        ]
      }
    ];

    const allNodes = sections.flatMap(section => section.nodes.map(node => ({ ...node, section: section.name })));

    const state = {
      mode: "target",
      targetId: "",
      viaId: "",
      query: "",
      rules: [
        { targetId: "hy2", viaId: "sg-anytls", enabled: true },
        { targetId: "trojan", viaId: "sg-vision", enabled: true }
      ]
    };

    const el = id => document.getElementById(id);
    const nodeById = id => allNodes.find(node => node.id === id);

    function setMode(mode) {
      state.mode = mode;
      el("targetMode").classList.toggle("active", mode === "target");
      el("viaMode").classList.toggle("active", mode === "via");
      el("targetStep").classList.toggle("active", mode === "target");
      el("viaStep").classList.toggle("active", mode === "via");
      el("modeHint").textContent = `当前：${mode === "target" ? "出口" : "前置"}`;
      el("search").placeholder = mode === "target"
        ? "搜索出口，例如 trojan / hy2 / 新加坡"
        : "搜索前置，例如 anytls / x-air / 新加坡";
      renderNodes();
    }

    function chooseNode(id) {
      if (state.mode === "target") {
        state.targetId = id;
        if (!state.viaId) setMode("via");
      } else {
        state.viaId = id;
      }
      render();
    }

    function saveRule() {
      if (!state.targetId || !state.viaId) return;
      if (state.targetId === state.viaId) return;
      const existing = state.rules.find(rule => rule.targetId === state.targetId);
      if (existing) {
        existing.viaId = state.viaId;
        existing.enabled = true;
      } else {
        state.rules.unshift({ targetId: state.targetId, viaId: state.viaId, enabled: true });
      }
      render();
    }

    function editRule(rule) {
      state.targetId = rule.targetId;
      state.viaId = rule.viaId;
      setMode("target");
      render();
    }

    function removeRule(index) {
      state.rules.splice(index, 1);
      render();
    }

    function renderNodes() {
      const query = state.query.trim().toLowerCase();
      el("nodeList").innerHTML = sections.map(section => {
        const nodes = section.nodes.filter(node => {
          const haystack = `${node.name} ${node.type} ${section.name}`.toLowerCase();
          return !query || haystack.includes(query);
        });
        if (!nodes.length) return "";
        return `
          <div class="group-label">${section.name}</div>
          ${nodes.map(node => {
            const selected = node.id === state.targetId || node.id === state.viaId;
            return `
              <button class="node ${selected ? "selected" : ""}" data-node="${node.id}">
                <span class="node-name">${node.name}</span>
                <span class="node-meta">${node.type}</span>
              </button>
            `;
          }).join("")}
        `;
      }).join("");

      document.querySelectorAll("[data-node]").forEach(button => {
        button.addEventListener("click", () => chooseNode(button.dataset.node));
      });
    }

    function renderRoute() {
      const target = nodeById(state.targetId);
      const via = nodeById(state.viaId);
      el("targetValue").textContent = target ? target.name : "点击选择";
      el("viaValue").textContent = via ? via.name : "点击选择";
      el("targetStep").classList.toggle("empty", !target);
      el("viaStep").classList.toggle("empty", !via);
      el("yamlPreview").textContent = target && via
        ? `${chainName(target.name, via.name)}: dialer-proxy = ${via.name}`
        : "会新增一个链式出口节点，原节点保持不变。";
    }

    function renderRules() {
      el("ruleCount").textContent = `${state.rules.length} 条`;
      el("rules").innerHTML = state.rules.map((rule, index) => {
        const target = nodeById(rule.targetId);
        const via = nodeById(rule.viaId);
        const generatedName = chainName(target?.name || rule.targetId, via?.name || rule.viaId);
        return `
          <div class="rule ${rule.enabled ? "" : "off"}">
            <div class="rule-top">
              <div class="rule-path">
                <span>${via?.name || rule.viaId}</span>
                <span class="arrow">-></span>
                <span>${target?.name || rule.targetId}</span>
              </div>
              <button class="switch" data-toggle="${index}" aria-label="启用"></button>
            </div>
            <div class="hint">新节点：${generatedName}</div>
            <div class="rule-actions">
              <button class="mini" data-edit="${index}">编辑</button>
              <button class="mini" data-delete="${index}">删除</button>
            </div>
          </div>
        `;
      }).join("");

      document.querySelectorAll("[data-toggle]").forEach(button => {
        button.addEventListener("click", () => {
          const rule = state.rules[Number(button.dataset.toggle)];
          rule.enabled = !rule.enabled;
          renderRules();
        });
      });
      document.querySelectorAll("[data-edit]").forEach(button => {
        button.addEventListener("click", () => editRule(state.rules[Number(button.dataset.edit)]));
      });
      document.querySelectorAll("[data-delete]").forEach(button => {
        button.addEventListener("click", () => removeRule(Number(button.dataset.delete)));
      });
    }

    function chainName(targetName, viaName) {
      return `链式出口 | ${targetName} | 前置 ${viaName}`;
    }

    function render() {
      renderNodes();
      renderRoute();
      renderRules();
    }

    el("targetMode").addEventListener("click", () => setMode("target"));
    el("viaMode").addEventListener("click", () => setMode("via"));
    el("targetStep").addEventListener("click", () => setMode("target"));
    el("viaStep").addEventListener("click", () => setMode("via"));
    el("save").addEventListener("click", saveRule);
    el("reset").addEventListener("click", () => {
      state.targetId = "";
      state.viaId = "";
      state.query = "";
      el("search").value = "";
      setMode("target");
      render();
    });
    el("search").addEventListener("input", event => {
      state.query = event.target.value;
      renderNodes();
    });

    render();
  </script>
</body>
</html>
